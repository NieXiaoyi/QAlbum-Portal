<h2>选择你喜欢的页面布局方向</h2>
<p class="subtitle">三种方案各有侧重，点击选择你偏好的</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏导航 · 经典布局</h3>
      <div class="mockup" style="margin-top:12px">
        <div style="display:flex;min-height:160px;gap:4px;">
          <div style="width:60px;background:var(--bg-muted);border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:6px;">
            <div style="width:32px;height:6px;border-radius:3px;background:var(--accent)"></div>
            <div style="width:32px;height:6px;border-radius:3px;background:var(--bg-subtle)"></div>
            <div style="width:32px;height:6px;border-radius:3px;background:var(--bg-subtle)"></div>
            <div style="width:32px;height:6px;border-radius:3px;background:var(--bg-subtle)"></div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <div style="height:24px;background:var(--bg-muted);border-radius:6px;width:60%"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;flex:1;">
              <div style="background:var(--bg-muted);border-radius:6px"></div>
              <div style="background:var(--bg-muted);border-radius:6px"></div>
              <div style="background:var(--bg-muted);border-radius:6px"></div>
            </div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)">桌面端侧边栏导航，移动端收起为汉堡菜单。结构清晰，适合较多页面层级。</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>标签栏导航 · 移动优先</h3>
      <div class="mockup" style="margin-top:12px">
        <div style="display:flex;flex-direction:column;min-height:160px;gap:4px;">
          <div style="display:flex;gap:6px;">
            <div style="height:24px;flex:1;background:var(--bg-muted);border-radius:6px"></div>
            <div style="height:24px;flex:1;background:var(--bg-subtle);border-radius:6px"></div>
            <div style="height:24px;flex:1;background:var(--bg-subtle);border-radius:6px"></div>
          </div>
          <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
            <div style="background:var(--bg-muted);border-radius:6px"></div>
            <div style="background:var(--bg-muted);border-radius:6px"></div>
            <div style="background:var(--bg-muted);border-radius:6px"></div>
            <div style="background:var(--bg-muted);border-radius:6px"></div>
          </div>
          <div style="display:flex;gap:6px;padding-top:4px;">
            <div style="height:18px;flex:1;border-radius:4px;background:var(--accent)"></div>
            <div style="height:18px;flex:1;border-radius:4px;background:var(--bg-subtle)"></div>
            <div style="height:18px;flex:1;border-radius:4px;background:var(--bg-subtle)"></div>
            <div style="height:18px;flex:1;border-radius:4px;background:var(--bg-subtle)"></div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)">顶部标签切换，底部操作栏。移动端体验最佳，桌面端同样流畅。</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>仪表盘主页 · 内容驱动</h3>
      <div class="mockup" style="margin-top:12px">
        <div style="display:flex;flex-direction:column;min-height:160px;gap:4px;">
          <div style="display:grid;grid-template-columns:2fr 1fr;gap:4px;">
            <div style="background:var(--bg-muted);border-radius:8px;height:60px;display:flex;flex-direction:column;justify-content:center;padding:0 8px;gap:2px;">
              <div style="height:8px;width:60%;background:var(--accent);border-radius:4px"></div>
              <div style="height:6px;width:80%;background:var(--bg-subtle);border-radius:3px"></div>
            </div>
            <div style="background:var(--bg-muted);border-radius:8px;height:60px;display:flex;flex-direction:column;justify-content:center;padding:0 8px;gap:2px;">
              <div style="height:8px;width:50%;background:var(--accent);border-radius:4px"></div>
              <div style="height:6px;width:70%;background:var(--bg-subtle);border-radius:3px"></div>
            </div>
          </div>
          <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
            <div style="background:var(--bg-muted);border-radius:6px"></div>
            <div style="background:var(--bg-muted);border-radius:6px"></div>
            <div style="background:var(--bg-muted);border-radius:6px"></div>
          </div>
          <div style="display:flex;gap:4px;">
            <div style="height:24px;flex:1;background:var(--bg-subtle);border-radius:6px"></div>
            <div style="height:24px;width:80px;background:var(--accent);border-radius:6px"></div>
          </div>
        </div>
      </div>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)">首页以内容预览卡片驱动，一目了然看到最新照片、最近活动。沉浸感最强。</p>
    </div>
  </div>
</div>
