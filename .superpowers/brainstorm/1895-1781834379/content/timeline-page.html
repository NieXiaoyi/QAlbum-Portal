<h2>时光轴首页</h2>
<p class="subtitle">进入 app 后的第一屏，按时间组织照片流</p>

<div class="section">
  <h3>页面布局</h3>
  <div style="display:flex;justify-content:center;margin:16px 0;">
    <div style="max-width:360px;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);background:#FFFCF8;">
      <div style="padding:16px;">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div>
            <div style="font-size:20px;font-weight:700;color:#D4956A;">我们的家</div>
            <div style="font-size:12px;color:#B8A090;">共 1,284 张照片</div>
          </div>
          <div style="display:flex;gap:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:#F0E6DA;display:flex;align-items:center;justify-content:center;font-size:16px;">🔍</div>
            <div style="width:36px;height:36px;border-radius:50%;background:#E8C9A0;display:flex;align-items:center;justify-content:center;font-size:16px;">+</div>
          </div>
        </div>

        <!-- Time group divider -->
        <div style="display:flex;align-items:center;gap:8px;margin:8px 0;">
          <div style="font-size:13px;font-weight:600;color:#D4956A;">2026 年 6 月</div>
          <div style="flex:1;height:1px;background:#F0E6DA;"></div>
        </div>

        <!-- Photo grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;overflow:hidden;">
            <div style="width:100%;height:70%;background:#E8D5C0;"></div>
            <div style="padding:4px;">
              <div style="height:8px;width:80%;background:#E8D5C0;border-radius:4px;margin-bottom:2px;"></div>
              <div style="height:6px;width:50%;background:#F0E6DA;border-radius:3px;"></div>
            </div>
          </div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;overflow:hidden;">
            <div style="width:100%;height:70%;background:#D4BFA8;"></div>
            <div style="padding:4px;">
              <div style="height:8px;width:60%;background:#D4BFA8;border-radius:4px;margin-bottom:2px;"></div>
              <div style="height:6px;width:70%;background:#F0E6DA;border-radius:3px;"></div>
            </div>
          </div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;overflow:hidden;">
            <div style="width:100%;height:70%;background:#E8D5C0;"></div>
            <div style="padding:4px;">
              <div style="height:8px;width:90%;background:#E8D5C0;border-radius:4px;margin-bottom:2px;"></div>
              <div style="height:6px;width:40%;background:#F0E6DA;border-radius:3px;"></div>
            </div>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin:12px 0 8px;">
          <div style="font-size:13px;font-weight:600;color:#D4956A;">2026 年 5 月</div>
          <div style="flex:1;height:1px;background:#F0E6DA;"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;"></div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;"></div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;"></div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:6px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>设计要点</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="font-weight:600;color:#D4956A;">📅 时间分组</div>
      <div style="font-size:13px;margin-top:4px;color:var(--text-muted)">照片按年月分组，每组有分隔标题，方便按时间浏览</div>
    </div>
    <div style="padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="font-weight:600;color:#D4956A;">🔍 搜索入口</div>
      <div style="font-size:13px;margin-top:4px;color:var(--text-muted)">可搜索照片名称或拍摄日期</div>
    </div>
    <div style="padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="font-weight:600;color:#D4956A;">➕ 快速上传</div>
      <div style="font-size:13px;margin-top:4px;color:var(--text-muted)">右上角 + 按钮，点击选择照片上传（可选择目标相册）</div>
    </div>
    <div style="padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="font-weight:600;color:#D4956A;">📊 响应式网格</div>
      <div style="font-size:13px;margin-top:4px;color:var(--text-muted)">移动端 3 列，桌面端自适应更多列</div>
    </div>
  </div>
</div>
