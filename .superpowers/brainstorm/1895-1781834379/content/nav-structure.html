<h2>整体导航结构</h2>
<p class="subtitle">标签栏导航 + 温暖家庭风，这是页面的骨架</p>

<div class="section">
  <h3>底部标签栏（移动端） / 顶部导航（桌面端）</h3>

  <div style="display:flex;justify-content:center;margin:16px 0;">
    <div style="max-width:400px;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
      <!-- Phone frame -->
      <div style="background:linear-gradient(180deg, #FFF8F0 0%, #FFFFFF 100%);padding:16px;">
        <!-- Status bar -->
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
          <div style="width:30px;height:6px;background:#ddd;border-radius:3px"></div>
          <div style="display:flex;gap:4px;">
            <div style="width:14px;height:14px;border-radius:50%;background:#ddd"></div>
            <div style="width:14px;height:14px;border-radius:50%;background:#ddd"></div>
          </div>
        </div>

        <!-- Page title -->
        <div style="text-align:center;margin-bottom:16px;">
          <div style="height:22px;width:120px;background:#E8C9A0;border-radius:6px;margin:0 auto"></div>
        </div>

        <!-- Content area (placeholder grid) -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:16px;">
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:8px"></div>
          <div style="aspect-ratio:1;background:#F0E6DA;border-radius:8px"></div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:8px"></div>
          <div style="aspect-ratio:1;background:#F0E6DA;border-radius:8px"></div>
          <div style="aspect-ratio:1;background:#F5EDE4;border-radius:8px"></div>
          <div style="aspect-ratio:1;background:#F0E6DA;border-radius:8px"></div>
        </div>

        <!-- Bottom tab bar -->
        <div style="display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #F0E6DA;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div style="width:20px;height:20px;border-radius:50%;background:#E8A87C"></div>
            <div style="width:32px;height:8px;border-radius:4px;background:#E8A87C"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;opacity:0.4;">
            <div style="width:20px;height:20px;border-radius:4px;background:#ccc"></div>
            <div style="width:32px;height:8px;border-radius:4px;background:#ccc"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;opacity:0.4;">
            <div style="width:20px;height:20px;border-radius:50%;background:#ccc"></div>
            <div style="width:32px;height:8px;border-radius:4px;background:#ccc"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;opacity:0.4;">
            <div style="width:20px;height:20px;border-radius:4px;background:#ccc"></div>
            <div style="width:32px;height:8px;border-radius:4px;background:#ccc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>四个主要标签页</h3>
  <div style="display:flex;flex-direction:column;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">📷</div>
      <div><strong>时光轴</strong><br><span style="font-size:13px;color:var(--text-muted)">按时间倒序展示全部照片，是进入相册的首页</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">📂</div>
      <div><strong>相册</strong><br><span style="font-size:13px;color:var(--text-muted)">查看所有相册、创建新相册、进入相册查看照片</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">🗑️</div>
      <div><strong>回收站</strong><br><span style="font-size:13px;color:var(--text-muted)">查看已删除的照片/相册，支持恢复或永久删除</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-muted);border-radius:12px;">
      <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div>
      <div><strong>设置 / 成员</strong><br><span style="font-size:13px;color:var(--text-muted)">个人设置、成员管理（管理员审核入口）、退出云空间</span></div>
    </div>
  </div>
</div>
